<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssistEd | Universal Assistant</title>
    <meta name="description" content="AssistEd: The universal assistant for voice navigation, live captioning, and text scanning.">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="app-title">AssistEd</h1>
            <div id="status-display" class="status-pill">Ready</div>
        </header>

        <main class="dashboard-grid">
            <div class="feature-card card-voicenav" id="btn-voicenav">
                <i data-lucide="mic"></i>
                <h3>Voice Navigation</h3>
            </div>

            <div class="feature-card card-caption" id="btn-caption">
                <i data-lucide="subtitles"></i>
                <h3>Live Caption</h3>
            </div>

            <div class="feature-card card-scan" id="btn-scan">
                <i data-lucide="scan-text"></i>
                <h3>Scan Text</h3>
            </div>

            <div class="feature-card card-notes" id="btn-notes">
                <i data-lucide="notebook-tabs"></i>
                <h3>My Notes</h3>
            </div>

            <div class="feature-card card-sos" id="btn-sos">
                <i data-lucide="alert-triangle"></i>
                <h3>SOS Alert</h3>
            </div>

            <div class="feature-card card-settings" id="btn-settings">
                <i data-lucide="settings"></i>
                <h3>Settings</h3>
            </div>
        </main>

        <section class="output-section">
            <span class="output-label">System Output</span>
            <div id="output-text">Welcome to AssistEd. Select a feature to begin.</div>
        </section>
    </div>

    <!-- Hidden Camera Container for Scan -->
    <div id="camera-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000;">
        <video id="camera-stream" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        <div style="position:absolute; bottom:2rem; left:0; right:0; display:flex; justify-content:center; gap:1rem;">
            <button id="btn-capture" style="padding:1rem 2rem; border-radius:99px; background:var(--color-orange); color:white; border:none; font-weight:bold;">CAPTURE</button>
            <button id="btn-close-camera" style="padding:1rem 2rem; border-radius:99px; background:var(--color-gray); color:white; border:none; font-weight:bold;">CLOSE</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Initialize icons
        lucide.createIcons();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker failed', err));
            });
        }
    </script>
</body>
</html>
